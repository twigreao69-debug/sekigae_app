name: Build Android APK (Final Fix)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Initialize Project and Capacitor
        run: |
          # フォルダを整理して、まっさらな状態から開始
          rm -f package.json capacitor.config.json
          mkdir -p www
          cp index.html www/
          cp manifest.json www/ || true
          
          # 最小限のパッケージを作成
          npm init -y
          npm install @capacitor/core@5.0.0 @capacitor/cli@5.0.0 @capacitor/android@5.0.0
          
          # Capacitorの初期化とAndroidフォルダの生成
          npx cap init "SekigaeApp" com.sekigae.app --web-dir www
          npx cap add android

      - name: Android Build with Gradle
        run: |
          cd android
          # 実行権限を付与してビルド開始
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sekigae-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
