<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>席替えアプリ</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --primary: #4f46e5; --text-primary: #1e293b; --text-secondary: #475569; --border: #e2e8f0; --background: #f8fafc; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: "Noto Sans JP", sans-serif; color: var(--text-primary); background: var(--background); display: flex; justify-content: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 480px; padding: 16px; margin: auto 0; }
        .card { background: white; border-radius: 24px; padding: 24px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 20px; }
        h1 { font-size: 1.8rem; font-weight: 900; text-align: center; color: var(--primary); margin-bottom: 5px; }
        h2 { font-size: 1.2rem; font-weight: 800; color: var(--primary); }
        .btn { min-height: 52px; border-radius: 14px; border: none; font-size: 1rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; }
        .btn-primary { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); color: white; }
        .btn-secondary { background: white; color: var(--text-primary); border: 1px solid var(--border); }
        .chips-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; }
        .chip { padding: 15px 5px; border-radius: 14px; background: white; border: 2px solid var(--border); text-align: center; font-weight: 700; cursor: pointer; }
        .chip.active { border-color: var(--primary); background: #eef2ff; color: var(--primary); }
        .result-number { font-size: 5rem; font-weight: 900; color: var(--primary); text-align: center; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); font-size: 1rem; }
        .char-item { display: flex; align-items: center; gap: 8px; background: #f1f5f9; padding: 10px; border-radius: 12px; margin-bottom: 8px; }
        .char-item input { padding: 8px; }
    </style>
</head>
<body>
    <div id="app" class="app-container"></div>
    <script>
        const STORAGE_KEY = 'sekigae_full_config';
        const LOGS_KEY = 'sekigae_full_logs';

        let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
            className: '3年A組', groupLabel: 'グループ',
            characters: [{label:'A',min:1,max:10},{label:'B',min:11,max:20}],
            maxAttendance: 40, passcode: '1234'
        };
        let logs = JSON.parse(localStorage.getItem(LOGS_KEY)) || [];

        const save = () => localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        const saveL = () => localStorage.setItem(LOGS_KEY, JSON.stringify(logs));

        const nav = (page, params) => {
            const app = document.getElementById('app');
            const pending = JSON.parse(localStorage.getItem('sekigae_pending'));
            if (pending && page !== 'result' && page !== 'admin') { page = 'result'; params = pending; }

            app.innerHTML = '';
            if (page === 'home') app.innerHTML = `<div class="card"><h1>${state.className}</h1><p style="text-align:center">${state.groupLabel}と席番号を引きます。</p><button class="btn btn-primary" onclick="nav('flow')">抽選を始める</button><button class="btn btn-secondary" onclick="auth()">管理パネル</button></div>`;
            
            if (page === 'flow') {
                let sel = null;
                const update = () => {
                    app.innerHTML = `<div class="card"><h2>${state.groupLabel}を選択</h2><div class="chips-container">${state.characters.map((c,i)=>`<div class="chip ${sel===i?'active':''}" onclick="setSel(${i})">${c.label}</div>`).join('')}</div><button class="btn btn-primary" style="${sel===null?'display:none':''}" onclick="doDraw()">抽選する</button><button class="btn btn-secondary" onclick="nav('home')">戻る</button></div>`;
                };
                window.setSel = (i) => { sel = i; update(); };
                window.doDraw = () => {
                    const c = state.characters[sel]; const used = logs.map(l=>l.seat); const avail = [];
                    for(let i=parseInt(c.min);i<=parseInt(c.max);i++) if(!used.includes(i)) avail.push(i);
                    if(!avail.length) return alert('空きがありません');
                    const s = avail[Math.floor(Math.random()*avail.length)];
                    const p = {char:c.label, seat:s}; localStorage.setItem('sekigae_pending', JSON.stringify(p)); nav('result', p);
                };
                update();
            }

            if (page === 'result') {
                app.innerHTML = `<div class="card"><div class="result-number">${params.seat}</div><p style="text-align:center">${state.groupLabel}: ${params.char}</p><div class="form-group"><label>出席番号</label><select id="att"><option value="">選択</option>${Array.from({length:state.maxAttendance},(_,i)=>i+1).filter(n=>!logs.some(l=>parseInt(l.attendance)===n)).map(n=>`<option value="${n}">${n}番</option>`).join('')}</select><button class="btn btn-primary" style="margin-top:10px" onclick="confirmS()">確定して保存</button></div></div>`;
                window.confirmS = () => {
                    const a = document.getElementById('att').value; if(!a) return alert('選択してください');
                    logs.push({attendance:a, char:params.char, seat:params.seat}); saveL();
                    localStorage.removeItem('sekigae_pending'); nav('home');
                };
            }

            if (page === 'admin') {
                const renderChr = () => state.characters.map((c,i)=>`
                    <div class="char-item">
                        <input style="flex:1" value="${c.label}" onchange="updC(${i},'label',this.value)">
                        <input type="number" style="width:60px" value="${c.min}" onchange="updC(${i},'min',this.value)">
                        <span>~</span>
                        <input type="number" style="width:60px" value="${c.max}" onchange="updC(${i},'max',this.value)">
                        <button onclick="delC(${i})" style="border:none;background:none;color:red;padding:5px">消去</button>
                    </div>`).join('');

                app.innerHTML = `<div class="card"><h2>管理</h2>
                    <input id="cn" value="${state.className}" placeholder="クラス名">
                    <input id="gl" value="${state.groupLabel}" placeholder="呼称">
                    <input type="number" id="ma" value="${state.maxAttendance}" placeholder="上限">
                    <div id="chr-list">${renderChr()}</div>
                    <button class="btn btn-secondary" onclick="addC()">＋文字を追加</button>
                    <button class="btn btn-primary" onclick="svA()">全て保存</button>
                    <button class="btn btn-secondary" onclick="nav('home')">戻る</button>
                    <button class="btn btn-secondary" style="color:red" onclick="logs=[];saveL();nav('admin')">履歴削除</button>
                </div>`;
                window.updC = (i,k,v) => { state.characters[i][k] = v; };
                window.addC = () => { state.characters.push({label:'?',min:0,max:0}); nav('admin'); };
                window.delC = (i) => { state.characters.splice(i,1); nav('admin'); };
                window.svA = () => {
                    state.className=document.getElementById('cn').value;
                    state.groupLabel=document.getElementById('gl').value;
                    state.maxAttendance=document.getElementById('ma').value;
                    save(); nav('home');
                };
            }
            if(window.lucide) lucide.createIcons();
        };

        const auth = () => { if(prompt('パスコード')===state.passcode) nav('admin'); };
        window.nav = nav; window.auth = auth;
        document.addEventListener('DOMContentLoaded', () => nav('home'));
    </script>
</body>
</html>
